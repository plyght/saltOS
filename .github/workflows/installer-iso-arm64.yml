name: installer-iso-arm64

on:
  workflow_dispatch:
  push:
    paths:
      - "os/iso/live-build.sh"
      - "os/installer/**"
      - ".github/workflows/installer-iso-arm64.yml"

concurrency:
  group: installer-iso-arm64-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: installer ISO (aarch64)
    runs-on: ubuntu-24.04-arm
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/local/lib/android /opt/ghc /usr/share/dotnet \
            /opt/hostedtoolcache/CodeQL /usr/local/.ghcup 2>/dev/null || true
          df -h /

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build pkg-config \
            libzstd-dev libsodium-dev libsqlite3-dev build-essential \
            mmdebstrap debian-archive-keyring squashfs-tools xorriso mtools \
            grub-efi-arm64-bin grub-common \
            qemu-system-arm qemu-system-data qemu-efi-aarch64

      - name: Build salt against the Debian base (arm64)
        run: |
          docker run --rm -v "$PWD":/src -w /src debian:bookworm bash -c '
            set -e
            apt-get update
            apt-get install -y --no-install-recommends \
              cmake ninja-build pkg-config g++ ca-certificates \
              libzstd-dev libsodium-dev libsqlite3-dev
            cmake -G Ninja -B build-iso -DCMAKE_BUILD_TYPE=Release
            cmake --build build-iso --target salt'

      - name: Build installer ISO (aarch64)
        run: |
          sudo env \
            SALT_BIN="$PWD/build-iso/src/salt/salt" \
            REPO_DIR="$PWD" \
            EDITION="installer" \
            VERSION="0.1.0" \
            OUT="$PWD/out-iso" \
            bash os/iso/live-build.sh aarch64
          sudo chown -R "$USER" out-iso

      - name: Boot test (QEMU aarch64, UEFI, best-effort)
        continue-on-error: true
        run: |
          ISO=$(ls out-iso/*.iso | head -1)
          echo "boot-testing installer ISO $ISO"
          echo "note: GitHub arm64 runners lack nested KVM and have no GPU; a graphical"
          echo "installer cannot be validated headlessly here. native UTM/HVF boot is the"
          echo "real validation. this step only confirms the ISO reaches early userspace."
          CODE=""
          for f in /usr/share/AAVMF/AAVMF_CODE.fd /usr/share/qemu-efi-aarch64/QEMU_EFI.fd; do
            [ -f "$f" ] && CODE="$f" && break
          done
          test -n "$CODE"
          if [ -f /usr/share/AAVMF/AAVMF_VARS.fd ]; then cp /usr/share/AAVMF/AAVMF_VARS.fd /tmp/vars.fd; else truncate -s 64m /tmp/vars.fd; fi
          truncate -s 64m /tmp/code.fd
          dd if="$CODE" of=/tmp/code.fd conv=notrunc 2>/dev/null
          set +e
          timeout 300 qemu-system-aarch64 \
            -machine virt,accel=kvm:tcg -cpu max -m 3072 -smp 2 \
            -drive if=pflash,format=raw,readonly=on,file=/tmp/code.fd \
            -drive if=pflash,format=raw,file=/tmp/vars.fd \
            -drive file="$ISO",if=virtio,format=raw,media=disk \
            -display none -no-reboot \
            -serial file:qemu.log &
          QPID=$!
          for i in $(seq 1 28); do
            sleep 10
            grep -q "saltOS" qemu.log 2>/dev/null && break
          done
          kill $QPID 2>/dev/null || true
          set -e
          echo "----- qemu serial tail -----"
          tail -n 80 qemu.log || true

      - name: Upload serial log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: installer-arm64-serial-log
          path: qemu.log
          if-no-files-found: ignore

      - name: Upload ISO
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: saltos-installer-aarch64
          path: out-iso/*.iso
          if-no-files-found: warn
