name: installer-base

on:
  workflow_dispatch:
  push:
    paths:
      - "os/iso/live-build.sh"
      - "src/setup/**"
      - "src/salt/**"
      - "src/halite/**"
      - "strata/**"
      - ".github/workflows/installer-base.yml"

jobs:
  build:
    name: base installer ISO (x86_64)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/local/lib/android /opt/ghc /usr/share/dotnet \
            /opt/hostedtoolcache/CodeQL /usr/local/.ghcup 2>/dev/null || true
          df -h /

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build pkg-config \
            libzstd-dev libsodium-dev libsqlite3-dev build-essential \
            mmdebstrap debian-archive-keyring squashfs-tools xorriso mtools \
            grub-pc-bin grub-efi-amd64-bin grub-common \
            qemu-system-x86 ovmf socat netpbm

      - name: Build salt and salt-setup against the Debian base
        run: |
          docker run --rm -v "$PWD":/src -w /src debian:bookworm bash -c '
            set -e
            apt-get update
            apt-get install -y --no-install-recommends \
              cmake ninja-build pkg-config g++ ca-certificates \
              libzstd-dev libsodium-dev libsqlite3-dev
            cmake -G Ninja -B build-iso -DCMAKE_BUILD_TYPE=Release
            cmake --build build-iso --target salt salt-setup'

      - name: Build base ISO
        run: |
          sudo env \
            SALT_BIN="$PWD/build-iso/src/salt/salt" \
            SALTSETUP_BIN="$PWD/build-iso/src/setup/salt-setup" \
            REPO_DIR="$PWD" \
            EDITION="base" \
            VERSION="0.1.0" \
            OUT="$PWD/out-iso" \
            bash os/iso/live-build.sh x86_64
          sudo chown -R "$USER" out-iso

      - name: Boot test (QEMU)
        run: |
          ISO=$(ls out-iso/*.iso | head -1)
          echo "boot-testing base ISO $ISO"
          rm -f /tmp/qmon
          MARKER="SALTOS_BOOT_OK"; MEM=4096; TMO=360; TRIES=30
          set +e
          timeout "$TMO" qemu-system-x86_64 \
            -machine pc -m "$MEM" -vga std -display none -no-reboot \
            -serial file:qemu.log -monitor unix:/tmp/qmon,server,nowait \
            -cdrom "$ISO" -boot d &
          QPID=$!
          for i in $(seq 1 "$TRIES"); do
            sleep 10
            grep -q "$MARKER" qemu.log 2>/dev/null && break
          done
          kill $QPID 2>/dev/null || true
          set -e
          echo "----- qemu serial tail -----"
          tail -n 120 qemu.log || true
          if grep -q "$MARKER" qemu.log; then
            echo "BASE BOOT OK: found $MARKER"
          else
            echo "BASE BOOT FAILED: $MARKER not found"
            exit 1
          fi

      - name: Upload serial log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: base-serial-log
          path: qemu.log
          if-no-files-found: ignore

      - name: Upload ISO
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: saltos-base-x86_64
          path: out-iso/*.iso
          if-no-files-found: warn
