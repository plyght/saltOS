name: selfhost-iso

on:
  workflow_dispatch:
  push:
    paths:
      - "os/selfhost/build.sh"
      - "os/selfhost/build-installed-image.sh"
      - "os/selfhost/saltos-install"
      - "os/selfhost/kernel-x86_64.config"
      - "src/**"
      - ".github/workflows/selfhost-iso.yml"

jobs:
  build:
    name: self-hosted ISO (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache compiled kernel
        uses: actions/cache@v4
        with:
          path: .kcache
          key: selfhost-kernel-6.6.52-${{ hashFiles('os/selfhost/kernel-x86_64.config') }}

      - name: Build from-source ISO (in a clean Debian container)
        run: |
          docker run --rm -v "$PWD":/src -w /src debian:bookworm bash -c '
            set -e
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y --no-install-recommends \
              build-essential cmake pkg-config musl-tools \
              bison flex bc libssl-dev libelf-dev \
              gawk texinfo python3 \
              xz-utils bzip2 curl file cpio ca-certificates \
              grub-pc-bin grub-efi-amd64-bin grub-common xorriso mtools
            REPO_DIR=/src OUT=/src/out-iso VERSION=0.1.0 KCACHE=/src/.kcache \
              bash os/selfhost/build.sh x86_64'
          sudo chown -R "$USER" out-iso selfhost-work .kcache 2>/dev/null || true

      - name: Install QEMU (host)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-system-x86 ovmf

      - name: Boot test (QEMU)
        run: |
          ISO=$(ls out-iso/*.iso | head -1)
          echo "boot-testing $ISO"
          set +e
          timeout 300 qemu-system-x86_64 \
            -machine pc -m 1024 -display none -serial stdio -no-reboot \
            -cdrom "$ISO" -boot d > qemu.log 2>&1
          set -e
          echo "----- qemu serial (head) -----"
          head -n 120 qemu.log || true
          echo "----- qemu serial (tail) -----"
          tail -n 120 qemu.log || true
          if grep -q "SALTOS_SELFHOST_OK" qemu.log; then
            echo "SELF-HOST BOOT OK: kernel+glibc+bash+coreutils+runit+salt from source, no distro base"
          else
            echo "BOOT FAILED: marker not found"
            exit 1
          fi

      - name: Installer test (blank disk -> installed UEFI boot)
        run: |
          set -euo pipefail
          cat > selfhost-work/rootfs/autoinstall-test <<'EOF'
          #!/bin/sh
          PATH=/usr/local/salt/shims:/usr/bin:/usr/sbin:/bin:/sbin; export PATH
          mount -t proc proc /proc 2>/dev/null
          mount -t sysfs sys /sys 2>/dev/null
          mount -t devtmpfs dev /dev 2>/dev/null
          mount -t tmpfs run /run 2>/dev/null
          mount -t tmpfs tmp /tmp 2>/dev/null
          printf "YES\n" | saltos-install /dev/vda
          st=$?
          echo "SALTOS_INSTALL_EXIT=$st" >/dev/console
          sync
          poweroff -f
          EOF
          chmod +x selfhost-work/rootfs/autoinstall-test
          ( cd selfhost-work/rootfs && find . | cpio -o -H newc 2>/dev/null | gzip -9 > ../initrd-autoinstall.gz )

          dd if=/dev/zero of=saltos-installed-x86_64.img bs=1M count=2048 status=none
          timeout 240 qemu-system-x86_64 \
            -machine q35 -m 1536 -smp 2 -display none -serial file:qemu-install.log -no-reboot \
            -kernel selfhost-work/bzImage \
            -initrd selfhost-work/initrd-autoinstall.gz \
            -append "console=ttyS0,115200 rdinit=/autoinstall-test" \
            -drive file=saltos-installed-x86_64.img,format=raw,if=none,id=hd0 \
            -device virtio-blk-pci,drive=hd0 \
            -netdev user,id=n0 -device virtio-net-pci,netdev=n0 || true

          tail -n 180 qemu-install.log || true
          grep -q "SALTOS_INSTALL_EXIT=0" qemu-install.log

          OVMF_CODE=""
          for f in /usr/share/OVMF/OVMF_CODE.fd /usr/share/ovmf/OVMF.fd; do
            [ -f "$f" ] && OVMF_CODE="$f" && break
          done
          [ -n "$OVMF_CODE" ] || { echo "missing OVMF firmware"; exit 1; }

          timeout 120 qemu-system-x86_64 \
            -machine q35 -m 1024 -smp 2 -display none -serial file:qemu-installed-uefi.log -no-reboot \
            -bios "$OVMF_CODE" \
            -drive file=saltos-installed-x86_64.img,format=raw,if=none,id=hd0 \
            -device virtio-blk-pci,drive=hd0 \
            -netdev user,id=n0 -device virtio-net-pci,netdev=n0 || true

          tail -n 200 qemu-installed-uefi.log || true
          grep -q "Run /sbin/runit-init as init process" qemu-installed-uefi.log

      - name: Upload serial log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-serial-log
          path: |
            qemu.log
            qemu-install.log
            qemu-installed-uefi.log
          if-no-files-found: ignore

      - name: Upload ISO
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: saltos-selfhost-x86_64
          path: out-iso/*.iso
          if-no-files-found: warn
