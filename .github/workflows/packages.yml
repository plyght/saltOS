name: packages

on:
  workflow_dispatch:
  push:
    paths:
      - "recipes/**"

concurrency:
  group: packages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build packages (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build pkg-config \
            libzstd-dev libsodium-dev libsqlite3-dev \
            build-essential

      - name: Build salt
        run: |
          cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target salt

      - name: Lint recipes (gate)
        run: |
          export PATH="$PWD/build/src/salt:$PATH"
          status=0
          for dir in recipes/*/; do
            [ -f "$dir/recipe.toml" ] || continue
            echo "::group::lint $dir"
            salt lint "$dir" || status=1
            echo "::endgroup::"
          done
          exit $status

      - name: Admission report (informational)
        run: |
          export PATH="$PWD/build/src/salt:$PATH"
          ready=0; pending=0
          for dir in recipes/*/; do
            [ -f "$dir/recipe.toml" ] || continue
            if salt trust admit "$dir" >/dev/null 2>&1; then
              ready=$((ready+1))
            else
              pending=$((pending+1))
              echo "pending admission: $dir"
            fi
          done
          echo "admission-ready: $ready  pending: $pending"

      - name: Build packages
        run: |
          export PATH="$PWD/build/src/salt:$PATH"
          export SALT_ARCH="${{ matrix.arch }}"
          export SALT_OUT="$PWD/out"
          built=0; failed=0
          for dir in recipes/*/; do
            [ -f "$dir/recipe.toml" ] || continue
            echo "::group::build $dir"
            if salt build "$dir"; then
              built=$((built+1))
            else
              failed=$((failed+1))
              echo "build pending for $dir on ${{ matrix.arch }} (likely TODO-sha256 or missing dep)"
            fi
            echo "::endgroup::"
          done
          echo "built: $built  pending: $failed"

      - name: Publish signed repo index
        env:
          SALT_REPO_SECKEY: ${{ secrets.SALT_REPO_SECKEY }}
        run: |
          export PATH="$PWD/build/src/salt:$PATH"
          ARCH="${{ matrix.arch }}"
          if [ ! -d "out/$ARCH/packages" ]; then
            echo "no packages built for $ARCH yet; skipping publish"
            exit 0
          fi
          if [ -z "${SALT_REPO_SECKEY:-}" ]; then
            echo "No signing key configured; producing unsigned index for inspection."
            salt repo publish "out/$ARCH"
          else
            salt --key "$SALT_REPO_SECKEY" repo publish "out/$ARCH"
          fi

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: grain-${{ matrix.arch }}
          path: |
            out/**/*.grain
            out/**/index.toml
            out/**/index.toml.sig
          if-no-files-found: warn
