name = "qt6-svg"
version = "6.7.2"
release = 1
summary = "Qt6 SVG rendering module"
license = "LGPL-3.0-only"
arch = ["x86_64", "aarch64"]

[source]
url = "https://download.qt.io/official_releases/qt/6.7/6.7.2/submodules/qtsvg-everywhere-src-6.7.2.tar.xz"
sha256 = "TODO-sha256"

[build]
system = "cmake"
deps = ["cmake", "ninja", "pkgconf", "qt6-base", "gcc"]
script = """
#!/bin/sh
cmake -G Ninja -S "$SALT_SRC" -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr
cmake --build build -j"$SALT_JOBS"
DESTDIR="$SALT_DEST" cmake --install build
"""

[package]
deps = ["glibc", "qt6-base"]

[reproducibility]
status = "verified"
