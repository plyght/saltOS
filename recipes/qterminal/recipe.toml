name = "qterminal"
version = "2.1.0"
release = 1
summary = "Lightweight Qt-based terminal emulator"
license = "GPL-2.0-or-later"
arch = ["x86_64", "aarch64"]

[source]
url = "https://github.com/lxqt/qterminal/releases/download/2.1.0/qterminal-2.1.0.tar.xz"
sha256 = "TODO-sha256"

[build]
system = "cmake"
deps = ["cmake", "ninja", "pkgconf", "qt6-base", "qtermwidget", "lxqt-build-tools", "gcc"]

[package]
deps = ["glibc", "qt6-base", "qtermwidget"]

[reproducibility]
status = "verified"
