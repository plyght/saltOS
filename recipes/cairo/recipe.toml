name = "cairo"
version = "1.18.0"
release = 1
summary = "2D graphics library with support for multiple output devices"
license = "LGPL-2.1-or-later"
arch = ["x86_64", "aarch64"]

[source]
url = "https://www.cairographics.org/releases/cairo-1.18.0.tar.xz"
sha256 = "243a0736b978a33dee29f9cca7521733b78a65b5418206fef7bd1c3d4cf10b64"

[build]
system = "meson"
deps = ["meson", "ninja", "pkgconf", "gcc", "freetype", "fontconfig", "libpng", "pixman"]

[package]
deps = ["glibc", "freetype", "fontconfig", "libpng", "pixman"]

[reproducibility]
status = "verified"
