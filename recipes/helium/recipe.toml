name = "helium"
version = "0.13.5.1"
release = 1
summary = "Helium privacy-focused Chromium-derived web browser (prebuilt)"
license = "BSD-3-Clause"
arch = ["x86_64", "aarch64"]

[source]
url = "https://github.com/imputnet/helium-linux/releases/download/0.13.5.1/helium-0.13.5.1-x86_64.AppImage"
sha256 = "5409dc2fbf27c974513543d9d9cd10b9dc45adfc72eed5c4d8d14de2d79e7b39"

[build]
system = "custom"
deps = ["coreutils", "tar", "zstd"]
script = """
#!/bin/sh
if [ "$SALT_ARCH" = "aarch64" ]; then
  appimage="$SALT_SRC/helium-${SALT_ARCH}.AppImage"
else
  appimage="$SALT_SRC/helium-x86_64.AppImage"
fi
[ -f "$appimage" ] || appimage=$(ls "$SALT_SRC"/helium-*.AppImage | head -n1)
chmod +x "$appimage"
"$appimage" --appimage-extract
install -d "$SALT_DEST/opt/helium"
cp -a squashfs-root/. "$SALT_DEST/opt/helium/"
install -d "$SALT_DEST/usr/bin"
ln -sf /opt/helium/AppRun "$SALT_DEST/usr/bin/helium"
install -d "$SALT_DEST/usr/share/applications"
if [ -f "$SALT_DEST/opt/helium/helium.desktop" ]; then
  cp "$SALT_DEST/opt/helium/helium.desktop" "$SALT_DEST/usr/share/applications/helium.desktop"
fi
"""

[package]
deps = ["glibc", "mesa", "fontconfig", "freetype", "libx11", "nss", "alsa-lib"]

[reproducibility]
status = "unverified"
reason = "Chromium-derived browser build currently not bit-for-bit reproducible"
