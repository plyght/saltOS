name = "liblxqt"
version = "2.1.0"
release = 1
summary = "Core utility library shared across LXQt components"
license = "LGPL-2.1-or-later"
arch = ["x86_64", "aarch64"]

[source]
url = "https://github.com/lxqt/liblxqt/releases/download/2.1.0/liblxqt-2.1.0.tar.xz"
sha256 = "TODO-sha256"

[build]
system = "cmake"
deps = ["cmake", "ninja", "pkgconf", "qt6-base", "libqtxdg", "lxqt-build-tools", "gcc"]

[package]
deps = ["glibc", "qt6-base", "libqtxdg"]

[reproducibility]
status = "verified"
