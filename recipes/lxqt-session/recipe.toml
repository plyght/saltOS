name = "lxqt-session"
version = "2.1.0"
release = 1
summary = "LXQt session manager"
license = "LGPL-2.1-or-later"
arch = ["x86_64", "aarch64"]

[source]
url = "https://github.com/lxqt/lxqt-session/releases/download/2.1.0/lxqt-session-2.1.0.tar.xz"
sha256 = "b745ef14afec4bed788aeb2d448861fbc0c6f738c1ce956f4a6450f6c745270b"

[build]
