name = "lxqt-build-tools"
version = "2.1.0"
release = 1
summary = "Build tools and CMake modules for LXQt"
license = "BSD-3-Clause"
arch = ["x86_64", "aarch64"]

[source]
url = "https://github.com/lxqt/lxqt-build-tools/releases/download/2.1.0/lxqt-build-tools-2.1.0.tar.xz"
