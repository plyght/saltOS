name = "zstd"
version = "1.5.6"
release = 1
summary = "Zstandard fast real-time compression algorithm"
license = "BSD-3-Clause"
arch = ["x86_64", "aarch64"]

[source]
url = "https://github.com/facebook/zstd/releases/download/v1.5.6/zstd-1.5.6.tar.gz"
sha256 = "8c29e06cf42aacc1eafc4077ae2ec6c6fcb96a626157e0593d5e82a34fd403c1"

[build]
system = "make"
deps = ["gcc", "make", "zlib", "xz", "glibc"]
script = """
#!/bin/sh
make -j"$SALT_JOBS" prefix=/usr
make prefix=/usr DESTDIR="$SALT_DEST" install
"""

[package]
deps = ["zlib", "xz", "glibc"]

[reproducibility]
status = "verified"
