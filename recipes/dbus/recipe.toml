name = "dbus"
version = "1.14.10"
release = 1
summary = "Message bus system for interprocess communication"
license = "GPL-2.0-or-later"
arch = ["x86_64", "aarch64"]

[source]
url = "https://dbus.freedesktop.org/releases/dbus/dbus-1.14.10.tar.xz"
sha256 = "ba1f21d2bd9d339da2d4aa8780c09df32fea87998b73da24f49ab9df1e36a50f"

[build]
system = "meson"
deps = ["gcc", "make", "meson", "ninja", "expat"]
script = """
#!/bin/sh
meson setup build \\
    --prefix=/usr \\
    --buildtype=release \\
    -Dsystemd=disabled \\
    -Dx11_autolaunch=disabled
ninja -C build
DESTDIR="$SALT_DEST" ninja -C build install
"""

[package]
deps = ["glibc", "expat"]

[reproducibility]
status = "verified"
