name = "dracut"
version = "060"
release = 1
summary = "Event-driven initramfs infrastructure"
license = "GPL-2.0-or-later"
arch = ["x86_64", "aarch64"]

[source]
url = "https://github.com/dracut-ng/dracut-ng/archive/refs/tags/060.tar.gz"
sha256 = "ffcd81841b7e45ea1196871b95f1c2aafd4aaa85c73f098bfc5015f920b87375"

[build]
system = "custom"
deps = ["gcc", "make", "bash", "pkgconf", "kmod"]
script = """
#!/bin/sh
./configure --prefix=/usr --sysconfdir=/etc --systemdsystemunitdir=
make -j"$SALT_JOBS"
make DESTDIR="$SALT_DEST" install
"""

[package]
deps = ["bash", "kmod", "coreutils", "util-linux", "busybox"]

[reproducibility]
status = "verified"
