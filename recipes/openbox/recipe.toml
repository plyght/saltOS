name = "openbox"
version = "3.6.1"
release = 1
summary = "Highly configurable X11 window manager"
license = "GPL-2.0-or-later"
arch = ["x86_64", "aarch64"]

[source]
url = "http://openbox.org/dist/openbox/openbox-3.6.1.tar.xz"
sha256 = "abe75855cc5616554ffd47134ad15291fe37ebbebf1a80b69cbde9d670f0e26d"

[build]
system = "autotools"
deps = ["pkgconf", "gcc", "make", "libx11", "pango", "glib"]

[package]
deps = ["glibc", "libx11", "pango", "glib"]

[reproducibility]
status = "verified"
