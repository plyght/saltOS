name = "freetype"
version = "2.13.2"
release = 1
summary = "Freely available software library to render fonts"
license = "FTL"
arch = ["x86_64", "aarch64"]

[source]
url = "https://download.savannah.gnu.org/releases/freetype/freetype-2.13.2.tar.xz"
sha256 = "12991c4e55c506dd7f9b765933e62fd2be2e06d421505d7950a132e4f1bb484d"

[build]
system = "autotools"
deps = ["pkgconf", "gcc", "make", "zlib", "libpng"]

[package]
deps = ["glibc", "zlib", "libpng"]

[reproducibility]
status = "verified"
