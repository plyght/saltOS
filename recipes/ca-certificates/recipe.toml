name = "ca-certificates"
version = "2024.07.02"
release = 1
summary = "Mozilla CA root certificate bundle"
license = "MPL-2.0"
arch = ["x86_64", "aarch64"]

[source]
url = "https://curl.se/ca/cacert-2024-07-02.pem"
sha256 = "1bf458412568e134a4514f5e170a328d11091e071c7110955c9884ed87972ac9"

[build]
system = "custom"
deps = ["openssl"]
script = """
#!/bin/sh
install -d "$SALT_DEST/etc/ssl/certs"
install -m 0644 "$SALT_SRC/cacert-2024-07-02.pem" "$SALT_DEST/etc/ssl/certs/ca-certificates.crt"
install -d "$SALT_DEST/etc/ssl"
ln -sf certs/ca-certificates.crt "$SALT_DEST/etc/ssl/cert.pem"
"""

[package]
deps = ["openssl"]

[reproducibility]
status = "verified"
