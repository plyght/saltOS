name = "cmake"
version = "3.30.5"
release = 1
summary = "Cross-platform build system generator"
license = "BSD-3-Clause"
arch = ["x86_64", "aarch64"]

[source]
url = "https://github.com/Kitware/CMake/releases/download/v3.30.5/cmake-3.30.5.tar.gz"
sha256 = "TODO-sha256"

[build]
system = "custom"
deps = ["gcc", "make", "openssl", "zlib", "ncurses", "bzip2", "xz", "zstd"]
script = """
#!/bin/sh
./bootstrap --prefix=/usr --system-libs --parallel="$SALT_JOBS" --no-qt-gui
make -j"$SALT_JOBS"
make DESTDIR="$SALT_DEST" install
"""

[package]
deps = ["glibc", "openssl", "zlib", "ncurses"]

[reproducibility]
status = "verified"
