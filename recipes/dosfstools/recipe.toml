name = "dosfstools"
version = "4.2"
release = 1
summary = "Utilities for creating and checking FAT filesystems"
license = "GPL-3.0-or-later"
arch = ["x86_64", "aarch64"]

[source]
url = "https://github.com/dosfstools/dosfstools/releases/download/v4.2/dosfstools-4.2.tar.gz"
sha256 = "64926eebf90092dca21b14259a5301b7b98e7b1943e8a201c7d726084809b527"

[build]
system = "autotools"
deps = ["gcc", "make"]
script = """
#!/bin/sh
./configure --prefix=/usr \\
    --enable-compat-symlinks \\
    --mandir=/usr/share/man \\
    --docdir=/usr/share/doc/dosfstools-4.2
make -j"$SALT_JOBS"
make DESTDIR="$SALT_DEST" install
"""

[package]
deps = ["glibc"]

[reproducibility]
status = "verified"
