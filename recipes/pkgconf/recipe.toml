name = "pkgconf"
version = "2.2.0"
release = 1
summary = "Tool to query compile and link flags, provides pkg-config"
license = "ISC"
arch = ["x86_64", "aarch64"]

[source]
url = "https://distfiles.ariadne.space/pkgconf/pkgconf-2.2.0.tar.xz"
sha256 = "b06ff63a83536aa8c2f6422fa80ad45e4833f590266feb14eaddfe1d4c853c69"

[build]
system = "autotools"
deps = ["gcc", "make", "glibc"]
script = """
#!/bin/sh
./configure --prefix=/usr \\
    --disable-static
make -j"$SALT_JOBS"
make DESTDIR="$SALT_DEST" install
ln -sf pkgconf "$SALT_DEST/usr/bin/pkg-config"
"""

[package]
deps = ["glibc"]

[reproducibility]
status = "verified"
