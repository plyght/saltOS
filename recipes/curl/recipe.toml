name = "curl"
version = "8.11.0"
release = 1
summary = "Command line tool and library for transferring data with URLs"
license = "curl"
arch = ["x86_64", "aarch64"]

[source]
url = "https://curl.se/download/curl-8.11.0.tar.xz"
sha256 = "db59cf0d671ca6e7f5c2c5ec177084a33a79e04c97e71cf183a5cdea235054eb"

[build]
system = "autotools"
deps = ["gcc", "make", "pkgconf", "openssl", "zlib", "zstd", "ca-certificates"]
script = """
#!/bin/sh
./configure --prefix=/usr --with-openssl --with-ca-bundle=/etc/ssl/certs/ca-certificates.crt --enable-threaded-resolver --with-zstd
make -j"$SALT_JOBS"
make DESTDIR="$SALT_DEST" install
"""

[package]
deps = ["glibc", "openssl", "zlib", "zstd", "ca-certificates"]

[reproducibility]
status = "verified"
