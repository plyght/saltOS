name = "sddm"
version = "0.21.0"
release = 1
summary = "Simple Desktop Display Manager"
license = "GPL-2.0-or-later"
arch = ["x86_64", "aarch64"]

[source]
url = "https://github.com/sddm/sddm/archive/refs/tags/v0.21.0.tar.gz"
sha256 = "f895de2683627e969e4849dbfbbb2b500787481ca5ba0de6d6dfdae5f1549abf"

[build]
system = "cmake"
deps = ["cmake", "ninja", "pkgconf", "qt6-base", "gcc"]
script = """
#!/bin/sh
cmake -G Ninja -S "$SALT_SRC" -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr -DNO_PAM=ON -DUSE_QT6=ON
cmake --build build -j"$SALT_JOBS"
DESTDIR="$SALT_DEST" cmake --install build
"""

[package]
deps = ["glibc", "qt6-base"]

[reproducibility]
status = "verified"
