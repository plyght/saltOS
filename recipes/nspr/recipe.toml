name = "nspr"
version = "4.36"
release = 1
summary = "Netscape Portable Runtime"
license = "MPL-2.0"
arch = ["x86_64", "aarch64"]

[source]
url = "https://archive.mozilla.org/pub/nspr/releases/v4.36/src/nspr-4.36.tar.gz"
sha256 = "TODO-sha256"

[build]
system = "custom"
deps = ["gcc", "make"]
script = """
#!/bin/sh
cd nspr
./configure --prefix=/usr --with-mozilla --with-pthreads --enable-64bit
make -j"$SALT_JOBS"
make DESTDIR="$SALT_DEST" install
"""

[package]
deps = ["glibc"]

[reproducibility]
status = "verified"
