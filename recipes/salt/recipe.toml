name = "salt"
version = "0.1.0"
release = 1
summary = "saltOS package manager and builder"
license = "MIT"
arch = ["x86_64", "aarch64"]

[source]
url = "file://./"
sha256 = "TODO-sha256"

[build]
system = "cmake"
deps = ["gcc", "cmake", "ninja", "pkgconf", "zstd", "libsodium", "sqlite"]
script = """
#!/bin/sh
cmake -G Ninja -S "$SALT_SRC" -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr
cmake --build build -j"$SALT_JOBS"
DESTDIR="$SALT_DEST" cmake --install build
"""

[package]
deps = ["glibc", "zstd", "libsodium", "sqlite"]

[reproducibility]
status = "verified"
