name = "mpc"
version = "1.3.1"
release = 1
summary = "C library for complex number arithmetic with arbitrary precision"
license = "LGPL-3.0-or-later"
arch = ["x86_64", "aarch64"]

[source]
url = "https://ftp.gnu.org/gnu/mpc/mpc-1.3.1.tar.gz"
sha256 = "ab642492f5cf882b74aa0cb730cd410a81edcdbec895183ce930e706c1c759b8"

[build]
system = "autotools"
deps = ["gcc", "make", "gmp", "mpfr", "glibc"]
script = """
#!/bin/sh
./configure --prefix=/usr \\
    --disable-static \\
    --docdir=/usr/share/doc/mpc
make -j"$SALT_JOBS"
make DESTDIR="$SALT_DEST" install
"""

[package]
deps = ["gmp", "mpfr", "glibc"]

[reproducibility]
status = "verified"
