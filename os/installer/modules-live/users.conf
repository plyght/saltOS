---
defaultGroups:
    - users
    - sudo
    - wheel
    - audio
    - video
    - input
    - netdev
    - plugdev

autologinGroup: autologin
sudoersGroup: sudo
setRootPassword: true
doReusePassword: false

availableShells: /bin/bash, /bin/sh

avatarFilePath: ~/.face

passwordRequirements:
    minLength: 1
    maxLength: -1

allowWeakPasswords: true
allowWeakPasswordsDefault: true

user:
    shell: /bin/bash

hostname:
    location: EtcFile
    writeHostsFile: true
    template: "saltos"
    forbidden_names: [ localhost ]
