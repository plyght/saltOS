---
extraMounts:
    - device: proc
      fs: proc
      mountPoint: /proc
    - device: sys
      fs: sysfs
      mountPoint: /sys
    - device: /dev
      mountPoint: /dev
      options: bind
    - device: tmpfs
      fs: tmpfs
      mountPoint: /run
    - device: /run/udev
      mountPoint: /run/udev
      options: bind

extraMountsEfi:
    - device: efivarfs
      fs: efivarfs
      mountPoint: /sys/firmware/efi/efivars

btrfsSubvolumes:
    - mountPoint: /
      subvolume: /@
    - mountPoint: /home
      subvolume: /@home
    - mountPoint: /var
      subvolume: /@var
    - mountPoint: /var/log
      subvolume: /@log
    - mountPoint: /.snapshots
      subvolume: /@snapshots
    - mountPoint: /strata
      subvolume: /@strata

mountOptions:
    - mountPoint: /
      options: [ defaults, noatime ]
    - filesystem: btrfs
      options: [ defaults, noatime, compress=zstd:1, space_cache=v2 ]
    - filesystem: btrfs_swap
      options: [ defaults, noatime ]
