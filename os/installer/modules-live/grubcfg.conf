---
overwrite: false

defaults:
    GRUB_TIMEOUT: 5
    GRUB_DEFAULT: saved
    GRUB_DISABLE_SUBMENU: true
    GRUB_TERMINAL: "console serial"
    GRUB_DISABLE_OS_PROBER: false
    GRUB_CMDLINE_LINUX_DEFAULT: "quiet"
    GRUB_CMDLINE_LINUX: ""
    GRUB_SERIAL_COMMAND: "serial --speed=115200"
    GRUB_DISTRIBUTOR: "saltOS"
