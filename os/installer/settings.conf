---
modules-search: [ local, /usr/lib/calamares/modules, /usr/lib/x86_64-linux-gnu/calamares/modules, /usr/lib/aarch64-linux-gnu/calamares/modules ]

instances:
- id: saltos_btrfs
  module: saltos_btrfs
  config: saltos_btrfs.conf
- id: saltos_base
  module: saltos_base
  config: saltos_base.conf
- id: saltos_bootloader
  module: saltos_bootloader
  config: saltos_bootloader.conf
- id: saltos_runit
  module: saltos_runit
  config: saltos_runit.conf

sequence:
- show:
  - welcome
  - locale
  - keyboard
  - partition
  - users
  - summary
- exec:
  - partition
  - mount
  - saltos_btrfs
  - saltos_base
  - saltos_runit
  - saltos_bootloader
  - umount
- show:
  - finished

branding: saltos

prompt-install: true

dont-chroot: false

oem-setup: false

disable-cancel: false

disable-cancel-during-exec: false

hide-back-and-next-during-exec: true

quit-at-end: false
