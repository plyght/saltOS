[meta]
description = "Topologically ordered base-system build for saltOS"
arches = ["x86_64", "aarch64"]
stages = ["cross-toolchain", "temp-tools", "base", "desktop"]

[cross-toolchain]
packages = [
  "binutils",
  "gcc",
  "linux",
  "glibc",
  "gmp",
  "mpfr",
  "mpc",
]

[temp-tools]
packages = [
  "m4",
  "ncurses",
  "bash",
  "coreutils",
  "diffutils",
  "file",
  "findutils",
  "gawk",
  "grep",
  "gzip",
  "make",
  "patch",
  "sed",
  "tar",
  "xz",
  "zstd",
  "busybox",
]

