name = "alpine"
family = "alpine"
arch = "{arch}"
package_manager = "apk"
root = "/strata/alpine"
trust = "official"

[bootstrap]
method = "rootfs"
url = "https://dl-cdn.alpinelinux.org/alpine/v3.20/releases/{arch}/alpine-minirootfs-3.20.3-{arch}.tar.gz"
sha256 = ""
strip = 0

[integration]
graphics = true
audio = true
dbus = true

[[repository]]
name = "main"
url = "https://dl-cdn.alpinelinux.org/alpine/v3.20/main"

[[repository]]
name = "community"
url = "https://dl-cdn.alpinelinux.org/alpine/v3.20/community"
